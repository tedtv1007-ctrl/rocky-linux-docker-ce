---
- name: Management Node Setup (Docker, Compose, Prerequisites)
  hosts: mgmt_node
  become: true
  tasks:
    - name: Disable SWAP
      ansible.builtin.command: swapoff -a
      changed_when: false
      failed_when: false

    - name: Disable SWAP in fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
        replace: '# \1'

    - name: Install prerequisite packages
      ansible.builtin.dnf:
        name:
          - curl
          - policycoreutils
          - openssh-server
          - perl
          - dnf-utils
          - tar
          - wget
        state: present

    - name: Add Docker repository
      ansible.builtin.command: dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
      args:
        creates: /etc/yum.repos.d/docker-ce.repo
      changed_when: true

    - name: Install Docker CE
      ansible.builtin.dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Enable and start Docker service
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Configure firewalld for HTTP, HTTPS, SSH
      ansible.posix.firewalld:
        service: "{{ item }}"
        permanent: true
        state: enabled
        immediate: true
      loop:
        - http
        - https
        - ssh
      failed_when: false

    - name: Set SELinux to permissive mode
      ansible.posix.selinux:
        policy: targeted
        state: permissive
