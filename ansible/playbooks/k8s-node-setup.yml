---
- name: K8S Node Setup for Rocky Linux 9 (Enterprise Hardened)
  hosts: k8s_cluster
  become: true
  vars:
    k8s_version: "v1.31"
    containerd_config_path: "/etc/containerd/config.toml"
    pause_image: "registry.k8s.io/pause:3.10"
  tasks:
    - name: Enterprise Security - Configure SELinux
      ansible.builtin.selinux:
        policy: targeted
        state: permissive

    - name: System Stability - Disable SWAP immediately
      ansible.builtin.command: swapoff -a
      when: ansible_swaptotal_mb > 0
      changed_when: true

    - name: System Stability - Ensure SWAP is disabled in fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
        replace: '# \1'

    - name: K8S Core - Configure kernel modules
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        mode: "0644"
        content: |
          overlay
          br_netfilter
      notify: Load modules

    - name: Network Hardening - Set sysctl parameters and enable BBR
      ansible.builtin.copy:
        dest: /etc/sysctl.d/k8s.conf
        mode: "0644"
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1
          net.ipv4.conf.all.forwarding = 1
          net.core.default_qdisc = fq
          net.ipv4.tcp_congestion_control = bbr
      notify: Apply sysctl

    - name: Runtime Setup - Add Docker repository for containerd
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/centos/docker-ce.repo
        dest: /etc/yum.repos.d/docker-ce.repo
        mode: "0644"

    - name: Runtime Setup - Install containerd.io
      ansible.builtin.dnf:
        name: containerd.io
        state: present

    - name: Runtime Setup - Generate containerd default config
      ansible.builtin.shell:
        cmd: "containerd config default > {{ containerd_config_path }}"
        creates: "{{ containerd_config_path }}"

    - name: Runtime Setup - Configure SystemdCgroup and Sandbox Image
      ansible.builtin.replace:
        path: "{{ containerd_config_path }}"
        regexp: "{{ item.regexp }}"
        replace: "{{ item.replace }}"
      loop:
        - { regexp: 'SystemdCgroup = false', replace: 'SystemdCgroup = true' }
        - { regexp: 'sandbox_image = .*', replace: 'sandbox_image = "{{ pause_image }}"' }
      notify: Restart containerd

    - name: K8S Repo - Configure Kubernetes repository ({{ k8s_version }})
      ansible.builtin.yum_repository:
        name: kubernetes
        description: Kubernetes
        baseurl: "https://pkgs.k8s.io/core:/stable:/{{ k8s_version }}/rpm/"
        enabled: true
        gpgcheck: true
        gpgkey: "https://pkgs.k8s.io/core:/stable:/{{ k8s_version }}/rpm/repodata/repomd.xml.key"

    - name: K8S Core - Install core components and network tools
      ansible.builtin.dnf:
        name:
          - kubelet
          - kubeadm
          - kubectl
          - conntrack-tools
        state: present
        disable_excludes: kubernetes

    - name: K8S Core - Enable and start kubelet service
      ansible.builtin.systemd:
        name: kubelet
        enabled: true
        state: started

    - name: Security - Configure firewalld for K8S
      ansible.builtin.firewalld:
        port: "{{ item }}"
        permanent: true
        state: enabled
        immediate: true
      loop:
        - 6443/tcp # API Server
        - 10250/tcp # Kubelet API
        - 2379-2380/tcp # etcd
        - 10251/tcp # Scheduler
        - 10252/tcp # Controller Manager
        - 30000-32767/tcp # NodePort Services
      ignore_errors: true

  handlers:
    - name: Load modules
      ansible.builtin.command: "modprobe {{ item }}"
      loop:
        - overlay
        - br_netfilter
      changed_when: true

    - name: Apply sysctl
      ansible.builtin.command: sysctl --system
      changed_when: true

    - name: Restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted
        enabled: true
